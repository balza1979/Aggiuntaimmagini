<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>PDF della Cartella</title>

<style>
body {
  font-family: Arial;
  background-size: cover;
  background: black;
  background-position: center top;
  background-repeat: no-repeat;
  padding: 40px;
}

h1 {
  text-align: center;
  color: red; 
  font-weight: bold;
  font-size: 26px;
}

.back-button {
    position: fixed;
    top: 15px;
    right: 15px;
    background-color: #0275d8;
    color: white;
    padding: 20px 28px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    transition: background-color 0.2s ease;
    z-index: 999;
    font-size: 26px;
}

.back-button:hover {
    background-color: #025aa5;
}

.card {
  background: grey;
  padding: 20px;
  margin: 15px auto;
  max-width: 850px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-title {
  font-size: 36px;
  font-weight: 700;
  color: black;
  max-width: 60%;
  word-break: break-word;
}

.button-column {
  display: flex;
  flex-direction: column;
  gap: 15px;
  color: green;
}

.card button {
  background: green;
  color: white;
  border: none;
  padding: 16px 28px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 22px;
  font-weight: 700;
  width: 220px;
}

.card button:hover {
  background: #0056b3;
}

.preview-img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
  margin-right: 20px;
  border: 2px solid #222;
}

#loadingPopup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 30px 50px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  font-size: 28px;
  font-weight: bold;
  display: none;
  z-index: 2000;
  text-align: center;
}

#loadingPopup span {
  display: block;
  margin-top: 15px;
  font-size: 22px;
  font-weight: normal;
}

#testFrame {
  display: none;
}
</style>
</head>

<body>

<a class="back-button" href="index.html">⬅ Torna Indietro</a>

<h1 id="titolo"></h1>
<div id="pdf-container"></div>

<div id="loadingPopup">
  ⏳ Caricamento del documento...
  <span id="loadingSub">Attendere qualche secondo</span>
</div>

<iframe id="testFrame"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
const cartella = params.get("cartella");

document.getElementById("titolo").textContent = "Contenuti di: " + cartella;

fetch(cartella + "/")
  .then(response => response.text())
  .then(text => {
    const parser = new DOMParser();
    const html = parser.parseFromString(text, "text/html");
    const links = [...html.querySelectorAll("a")];

    const pdfContainer = document.getElementById("pdf-container");

    links.forEach(link => {
      const file = link.getAttribute("href");
      if (!file) return;

      const lower = file.toLowerCase();
      const isPDF = lower.endsWith(".pdf");

      if (isPDF) {
        const card = document.createElement("div");
        card.className = "card";

        // Cerco immagine con lo stesso nome del PDF
        const baseName = file.replace(".pdf", "");
        const possibleImages = [
          baseName + ".jpg",
          baseName + ".jpeg",
          baseName + ".png"
        ];

        let previewSrc = null;

        possibleImages.forEach(img => {
          if (links.some(l => l.getAttribute("href") === img)) {
            previewSrc = img;
          }
        });

        let previewHTML = "";
        if (previewSrc) {
          previewHTML = `<img class="preview-img" src="${cartella}/${previewSrc}" alt="preview">`;
        }

        card.innerHTML = `
          ${previewHTML}
          <div class="card-title">${file}</div>
          <div class="button-column">
            <button onclick="openPDF('${cartella}/${file}')">Apri PDF</button>
            <button onclick="downloadPDF('${cartella}/${file}')">Scarica</button>
          </div>
        `;

        pdfContainer.appendChild(card);
      }
    });
  });

function openPDF(url) {
  document.getElementById("loadingPopup").style.display = "block";
  setTimeout(() => {
    window.open(url, "_blank");
    document.getElementById("loadingPopup").style.display = "none";
  }, 800);
}

function downloadPDF(url) {
  const a = document.createElement("a");
  a.href = url;
  a.download = url.split("/").pop();
  a.click();
}
</script>

</body>
</html>>
